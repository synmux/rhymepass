[env]
RHYMEPASS_MISE_ACTIVE = 'true'

[settings]
env_file = '.env'

[tools]
python = { version = "3.14.4" }
uv     = { version = "0.11.7" }

# ── Development ───────────────────────────────────────────────────────────────

[tasks.sync]
description = "Install / refresh all dev dependencies"
run         = "uv sync --extra dev"

[tasks.test]
description = "Run the full test suite"
run         = "uv run pytest"

[tasks.test-verbose]
description = "Run the full test suite (verbose output)"
run         = "uv run pytest -v"

[tasks.run]
description = "Launch the interactive passphrase picker"
run         = "uv run rhymepass"

[tasks.smoke]
description = "Non-TTY smoke test — print 8 phrases via pipe"
run         = "uv run rhymepass 8 | cat"

[tasks.smoke-lib]
description = "Library API smoke test — call generate() directly"
run         = "uv run python -c 'from rhymepass import generate, build_anchor_pool, load_real_words; rw = load_real_words(); print(generate(build_anchor_pool(rw), rw))'"

# ── Build & publish ───────────────────────────────────────────────────────────

[tasks.clean]
description = "Remove build artefacts (dist/)"
run         = "rm -rf dist/"

[tasks.build]
description = "Build wheel and sdist into dist/ (cleans first)"
run         = ["rm -rf dist/", "uv build"]

[tasks.check]
description = "Preflight: validate dist/ metadata with twine (run after build)"
run         = "uvx twine check dist/*"

[tasks.publish-dry]
description = "Dry-run publish — build, preflight check, then simulate upload"
run         = [
  "rm -rf dist/",
  "uv build",
  "uvx twine check dist/*",
  "uv publish --dry-run",
]

[tasks.publish-test]
description = "Full release to TestPyPI — build, preflight check, upload"
run         = [
  "rm -rf dist/",
  "uv build",
  "uvx twine check dist/*",
  "uv publish --publish-url https://test.pypi.org/legacy/",
]

[tasks.publish]
description = "Full release to PyPI — build, preflight check, upload"
run         = [
  "rm -rf dist/",
  "uv build",
  "uvx twine check dist/*",
  "uv publish",
]
