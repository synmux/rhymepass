name: publish

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish:
    name: Build and publish to PyPI
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Pin package version to tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re

          tag = os.environ["TAG"]
          path = pathlib.Path("src/rhymepass/__init__.py")
          original = path.read_text()
          updated = re.sub(
              r'^__version__ = ".*"$',
              f'__version__ = "{tag}"',
              original,
              flags=re.MULTILINE,
          )
          if updated == original:
              raise SystemExit("did not find __version__ line to update")
          path.write_text(updated)
          print(f"__version__ set to {tag}")
          PY
          grep '^__version__' src/rhymepass/__init__.py

      - name: Install dependencies
        run: mise run sync

      - name: Publish to TestPyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TEST_PYPI_TOKEN }}
        run: mise run publish-test

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: mise run publish
